# Read-only toward upstream: only GETs public repo metadata and commits to this repo.

name: Refresh upstream snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1" # Weekly Monday 06:17 UTC

permissions:
  contents: write

concurrency:
  group: refresh-upstream-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/refresh_upstream_snapshot.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/upstream-snapshot.md
          if git diff --staged --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore: refresh upstream snapshot [skip ci]"
            git push
          fi
